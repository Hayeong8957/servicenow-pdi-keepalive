name: Keep ServiceNow PDI Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Debug secrets
        run: |
          echo "INSTANCE=${{ secrets.SN_INSTANCE }}"
          echo "USER=${{ secrets.SN_USER }}"

      - name: Ping ServiceNow PDI
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.SN_USER }}:${{ secrets.SN_PASS }}" \
            -H "User-Agent: pdi-keepalive" \
            --max-time 30 \
            "https://${{ secrets.SN_INSTANCE }}.service-now.com/")

          echo "HTTP Status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Ping failed"
            exit 1
          fi
